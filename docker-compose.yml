version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: kvreview_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
      POSTGRES_DB: kvreview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    networks:
      - kvreview-net

  redis:
    image: redis:alpine
    container_name: kvreview_redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - kvreview-net

  api:
    build:
      context: ./backend/KVReview.API
      dockerfile: Dockerfile
    container_name: kvreview_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Database=kvreview;Username=postgres;Password=Password123!"
      ConnectionStrings__Redis: "redis:6379"
      Jwt__Secret: "KVReview_SuperSecret_2026_JWT_SigningKey_MustBe32CharsOrMore!"
      Jwt__Issuer: "KVReview.API"
      Jwt__Audience: "KVReview.Client"
      Jwt__ExpiryHours: "24"
      Jwt__RefreshExpiryDays: "7"
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - kvreview-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kvreview_frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost/api"
    depends_on:
      - api
    restart: always
    networks:
      - kvreview-net

  nginx:
    image: nginx:alpine
    container_name: kvreview_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    restart: always
    networks:
      - kvreview-net

volumes:
  pgdata:

networks:
  kvreview-net:
    driver: bridge
